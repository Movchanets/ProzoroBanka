name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  DOTNET_VERSION: 10.0.x
  NODE_VERSION: 20.x

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: prozoro_banka_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prozoro_banka_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Backend/**/*.csproj', 'Backend/**/*.props', 'Backend/**/*.targets', 'Backend/ProzoroBanka.slnx') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore backend solution
        run: dotnet restore Backend/ProzoroBanka.slnx

      - name: Build backend solution
        run: dotnet build Backend/ProzoroBanka.slnx --configuration Release --no-restore

      - name: Run backend tests
        env:
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=prozoro_banka_ci;Username=postgres;Password=postgres
          Redis__Enabled: true
          Redis__ConnectionString: localhost:6379
          Ocr__Provider: fallback
          Storage__Provider: Local
        run: dotnet test Backend/ProzoroBanka.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: |
            **/test-results.trx
            **/TestResults/*.trx

  frontend-checks:
    name: Frontend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Lint frontend
        run: npm run lint

      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:5000
          VITE_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
          VITE_GOOGLE_CLIENT_ID: test-client-id
        run: npm run build

  terraform-checks:
    name: Terraform Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Infra
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform init -backend=false

      - name: Terraform validate
        run: terraform validate

  e2e-tests:
    name: E2E Tests (Playwright)
    needs: [backend-tests, frontend-checks]
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: prozoro_banka_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d prozoro_banka_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          dotnet-quality: preview

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: Frontend/package-lock.json

      - name: Install dependencies
        run: |
          dotnet restore Backend/ProzoroBanka.slnx
          cd Frontend && npm ci
          npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: Frontend
        env:
          # Database & Infrastructure
          ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=prozoro_banka_ci;Username=postgres;Password=postgres
          Redis__Enabled: true
          Redis__ConnectionString: localhost:6379
          Ocr__Provider: fallback
          Storage__Provider: Local
          
          # Backend Logic & Security (bypassing missing appsettings)
          ASPNETCORE_ENVIRONMENT: Development
          IS_PLAYWRIGHT_TESTS: "true"
          Jwt__Key: aa2b6d410067e355b1ac374939e2144e1264d35cce78b65f6fea59e6eadf65bb
          Jwt__RefreshKey: 2a6f7c0d7c93d33aee5ac4660ba732f3a92418ad5e523170bbe453bc82ead128
          Jwt__Issuer: ProzoroBanka-Dev
          Jwt__Audience: ProzoroBanka-Dev-Client
          Encryption__Key: 9618b101a497b89ad502f6c9d6080db4b3fee59ec43ca85173a4ddab3876564b
          
          # Turnstile Test Keys (Bypass)
          Turnstile__SecretKey: 1x0000000000000000000000000000000AA
          Turnstile__VerifyUrl: https://challenges.cloudflare.com/turnstile/v0/siteverify
          
          # Seed Data for TC-01
          Seed__Admin__Email: test@example.com
          Seed__Admin__Password: Qwerty-1
          
          # Frontend Env
          VITE_API_URL: http://localhost:5188
          VITE_TURNSTILE_SITE_KEY: 1x00000000000000000000AA
        run: npm run test:e2e -- --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: Frontend/playwright-report/
          retention-days: 7

