<!doctype html>
<html lang="uk">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex,nofollow" />
    <title>404 - Сторінку не знайдено | ProzoroBanka</title>
    <style>
      :root { color-scheme: light; }
      body {
        margin: 0;
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        background: linear-gradient(140deg, #f4eee7 0%, #e8edf5 100%);
        color: #1f2937;
      }
      main {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      article {
        width: min(760px, 100%);
        border: 1px solid #d7dce5;
        border-radius: 24px;
        padding: 28px;
        background: rgba(255, 255, 255, 0.92);
      }
      h1 { margin: 0 0 12px; font-size: 1.75rem; }
      p { line-height: 1.65; margin: 0 0 14px; }
      a {
        display: inline-block;
        margin-top: 10px;
        text-decoration: none;
        padding: 10px 16px;
        border-radius: 10px;
        background: #1f2937;
        color: #fff;
      }
    </style>
  </head>
  <body>
    <main>
      <article>
        <p>404</p>
        <h1>Сторінку не знайдено</h1>
        <p>
          Схоже, цього URL більше не існує або посилання містить помилку.
          Перейдіть на головну сторінку та скористайтеся каталогом зборів і організацій.
        </p>
        <a href="/">Повернутися на головну</a>
      </article>
    </main>
  </body>
</html>
